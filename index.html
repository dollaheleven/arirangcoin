<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARIRANG</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#050510,#120a2a);
color:white;
text-align:center;
}

h1{
font-size:80px;
color:#d8b4fe;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #a855f7;}
to{ text-shadow:0 0 40px #ec4899;}
}

.cta{
background:linear-gradient(90deg,#a855f7,#ec4899);
border:none;
padding:20px 50px;
font-size:22px;
border-radius:14px;
cursor:pointer;
margin-top:20px;
}

.section{
padding:60px 20px;
max-width:900px;
margin:auto;
}

.card{
background:#0f0f1f;
padding:25px;
border-radius:16px;
margin:20px 0;
box-shadow:0 0 25px rgba(168,85,247,.2);
}

#countdown{
font-size:24px;
color:#facc15;
margin-top:10px;
}

.feed{
text-align:left;
font-size:14px;
max-height:150px;
overflow:hidden;
}

.leaderboard{
text-align:left;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
width:80%;
}

footer{
opacity:.6;
padding:30px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="section">
<h1>ARIRANG</h1>
<p>The Global Fan Energy Coin 🚀</p>

<button class="cta" onclick="window.open('https://moonshot.com/HpbKxKKmDVRkRqzDoxVE9yaDAFhHZjCJoBxU6cYHmoon?ref=makM3z')">
🚀 Buy Now
</button>

<p>
Contract: <span id="contract">HpbKxKKmDVRkRqzDoxVE9yaDAFhHZjCJoBxU6cYHmoon</span>
<button onclick="copyContract()">Copy</button>
</p>

<div id="countdown"></div>
</div>

<!-- LIVE ACTIVITY -->
<div class="section">
<div class="card">
<h2>Live Activity</h2>
<div class="feed" id="feed"></div>
</div>
</div>

<!-- ENERGY -->
<div class="section">
<div class="card">
<h2>Fan Energy Meter ⚡</h2>
<p id="energy">Energy Rising...</p>
</div>
</div>

<!-- MEME GENERATOR -->
<div class="section">
<div class="card">
<h2>Create Your Meme</h2>

<input id="memeText" placeholder="Type your meme text..." />
<br><br>
<button onclick="generateMeme()">Generate Meme</button>

<p id="memeOutput" style="margin-top:20px;"></p>

</div>
</div>

<!-- LEADERBOARD -->
<div class="section">
<div class="card leaderboard">
<h2>Top Fans</h2>
<p>🔥 @CryptoFan01</p>
<p>🔥 @MoonRaider</p>
<p>🔥 @ArirangWhale</p>
<p>🔥 @EarlyHolder</p>
</div>
</div>

<!-- CHART -->
<div class="section">
<div class="card">
<h2>Chart</h2>

<iframe 
src="https://dexscreener.com" 
width="100%" 
height="400" 
style="border:none; border-radius:12px;">
</iframe>

</div>
</div>

<footer>
<p>Community-owned. No affiliation. Pure meme energy.</p>
</footer>

<script>

// Copy contract
function copyContract(){
const text=document.getElementById("contract").innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}

// Countdown
const targetDate = new Date("March 20, 2026 12:00:00").getTime();
setInterval(function(){
const now = new Date().getTime();
const d = targetDate - now;

const h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((d%(1000*60*60))/(1000*60));
const s = Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"Next Wave In: " + h + "h " + m + "m " + s + "s";

},1000);

// Fake live feed
const feedMessages = [
"🚀 Someone just bought ARIRANG",
"🔥 New holder joined",
"💰 Big buy detected",
"⚡ Energy rising",
"📈 Momentum building"
];

setInterval(function(){
const msg = feedMessages[Math.floor(Math.random()*feedMessages.length)];
const el = document.getElementById("feed");
el.innerHTML = "<p>"+msg+"</p>" + el.innerHTML;
},2000);

// Meme generator
function generateMeme(){
const text = document.getElementById("memeText").value;
document.getElementById("memeOutput").innerText =
"🚀 " + text + " 🚀";
}

// Energy animation
let level = 0;
setInterval(function(){
level++;
document.getElementById("energy").innerText =
"Energy Level: " + level;
},1500);

</script>

</body>
</html>
